# Copy to config/news.yaml (git-ignored) and tune for your focus.
enabled: true

# Each query is searched on every enabled source. Mix role/domain trend phrases
# with your target sectors. Keep them tight — broad queries make for noisy feeds.
queries:
  - "enterprise AI adoption"
  - "AI transformation leadership"
  - "chief AI officer"
  - "AI strategy banking"
  - "AI in manufacturing operations"
  - "generative AI consumer goods"

sources:
  google_news: true
  gdelt: true
  searxng: false                 # set true to also query a local SearxNG instance
  searxng_url: "http://127.0.0.1:8000"

freshness_hours: 96              # ignore articles older than this
max_per_query: 20                # cap fetched per query, per source
relevance_threshold: 0.6         # only keep articles the scorer rates >= this
model: "MiniMax-M2.5-highspeed"
llm: true                        # false = skip LLM scoring + summaries entirely
                                 # (keep every fresh article, body-text summaries)

# Deterministic noise gate, applied before everything else (the only gate when
# llm is false). Case-insensitive substring match on title+snippet / source name.
block_terms: []                  # e.g. ["appoints", "award", "webinar", "partner program"]
block_sources: []                # e.g. ["pr newswire", "business wire", "ein news"]
