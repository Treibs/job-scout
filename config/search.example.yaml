# Copy to config/search.yaml (git-ignored) and edit for your search.

# Sectors / company types / role families the self-tuning strategist must stay
# within when it proposes new keywords and companies. Free text — be specific to
# your goals. Leave empty to fall back to a generic resume-derived guardrail.
target_sectors: >-
  e.g. banking/insurance, manufacturing, consumer goods — <your metro> area,
  AI/innovation leadership roles

keywords:
  - "Director AI"
  - "Senior Manager AI"
  - "AI Adoption"
  - "AI Innovation"
location:
  query: "City, ST"           # free text; sources interpret it (e.g. "Chicago, IL" or "Remote")
  distance_miles: 50
  remote_policy: "include"    # include | exclude | only
seniority:                    # used by sources that support it + as a scoring gate
  - "director"
  - "executive"
freshness_hours: 72           # only fetch postings newer than this
results_per_board: 30         # keep low to stay under detection thresholds
hard_filters:
  exclude_industries:         # substring match over title+company+description
    - "healthcare"
    - "biotech"
    - "pharma"
  exclude_keywords: []        # JD-level kill words (matched over the whole listing)
  include_keywords: []        # optional must-haves (at least one required if set)
  exclude_companies: []       # drop by EMPLOYER (company field only) — e.g. Big Tech you won't compete at
  exclude_title_keywords: []  # drop by ROLE TYPE (title only) — e.g. "account executive", "sales rep"
