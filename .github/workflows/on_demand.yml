name: on-demand-job-scout
# A manual / API-triggered variant of the daily pipeline. Same body as daily.yml,
# but with no cron schedule — it only ever runs when you ask it to.
#
# You do NOT strictly need this file: daily.yml already declares
# `workflow_dispatch: {}`, so you can trigger that one manually instead. This file
# exists for clarity and to give on-demand runs their own name in the Actions UI.
#
# Trigger it via: the Actions tab "Run workflow" button, `gh workflow run
# on_demand.yml`, or POST /repos/OWNER/REPO/actions/workflows/on_demand.yml/dispatches.

on:
  workflow_dispatch: {}

concurrency:
  group: job-scout              # shares the daily group so they never overlap (shared cache)
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Restore rolling state (dedup memory · ledger · news cache · strategist adds)
        uses: actions/cache@v4
        with:
          path: |
            state
            config/discovery_additions.yaml
          key: jobscout-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            jobscout-state-

      - name: Scan (gather -> score -> tracker + dashboard + ledger)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          PROXY_URLS: ${{ secrets.PROXY_URLS }}
        run: python scripts/run.py --config config/search.yaml

      - name: Refresh the news board
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: python scripts/news.py --config config/search.yaml

      - name: Upload tracker + dashboards
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-scout-output
          path: |
            output/jobs.csv
            output/jobs.html
            output/news.html
          if-no-files-found: ignore
